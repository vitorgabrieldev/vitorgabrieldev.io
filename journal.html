<style>
.page--head { padding-top: 120px; padding-bottom: 64px; }
.head__line { display: flex; justify-content: space-between; padding-bottom: 40px; border-bottom: 1px solid var(--line); margin-bottom: 48px; }
.head__title { font-family: var(--font-display); font-size: clamp(44px, 7vw, 104px); letter-spacing: -0.045em; line-height: 0.95; font-weight: 500; max-width: 18ch; margin-bottom: 24px; }
.head__title em { font-style: italic; color: var(--accent); font-weight: 400; }
.head__lede { color: var(--ink-muted); font-size: 18px; max-width: 58ch; }

.jrn { padding: 40px var(--pad-page) var(--pad-section); }
.jrn__inner { max-width: 1200px; margin: 0 auto; }
.jrn__tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 40px; padding: 16px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.jrn__tags button { font-family: var(--font-mono); font-size: 12px; padding: 6px 12px; border-radius: 999px; color: var(--ink-muted); transition: all var(--dur) var(--ease); letter-spacing: .05em; }
.jrn__tags button.on { background: var(--ink); color: var(--bg); }
.jrn__tags button:hover { color: var(--ink); }
.jrn__tags button.on:hover { color: var(--bg); }

.jrn-list { border-top: 1px solid var(--line); }
.jrn-row { display: grid; grid-template-columns: 160px 160px 1fr auto; gap: 32px; padding: 32px 0; border-bottom: 1px solid var(--line); align-items: start; transition: padding var(--dur) var(--ease); cursor: pointer; text-decoration: none; color: inherit; }
.jrn-row:hover { padding-left: 20px; padding-right: 20px; background: var(--bg-elev); }
.jrn-row:hover .jrn-row__arrow { color: var(--accent); transform: translate(6px, -6px); }
.jrn-row__date { font-family: var(--font-mono); font-size: 12px; color: var(--ink-faint); letter-spacing: .06em; padding-top: 8px; }
.jrn-row__kicker { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--accent-ink); padding-top: 10px; }
.jrn-row__t { font-family: var(--font-display); font-size: 28px; letter-spacing: -0.02em; font-weight: 500; line-height: 1.15; margin-bottom: 10px; }
.jrn-row__excerpt { font-family: 'Source Serif 4', serif; font-size: 16px; color: var(--ink-muted); line-height: 1.55; max-width: 62ch; }
.jrn-row__meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .08em; margin-top: 10px; }
.jrn-row__arrow { font-family: var(--font-mono); font-size: 24px; color: var(--ink-faint); transition: all var(--dur) var(--ease); padding-top: 4px; }

@media (max-width: 900px) {
  .jrn-row { grid-template-columns: 1fr auto; }
  .jrn-row__date, .jrn-row__kicker { grid-column: 1 / -1; padding-top: 0; }
}

</style>
<link rel="stylesheet" href="shared/enhance.css?v=3">

<body data-screen-label="journal" data-density="comfortable">

<section class="page page--head">
  <div class="container">
    <div class="head__line reveal">
      <span class="mono-label" data-i18n="journal.head_label">[JOURNAL] Writing · Learning in public</span>
      <span class="mono-label" id="jrnCount">— entries</span>
    </div>
    <h1 class="head__title reveal reveal-delay-1" data-i18n="journal.head_title" data-i18n-html>Thinking out loud, in <em>full paragraphs</em>.</h1>
    <p class="head__lede reveal reveal-delay-2" data-i18n="journal.head_lede">Notes on architecture, decisions in production, and what I'm reading. Unpolished by design — the point is to think, not to publish.</p>
  </div>
</section>

<section class="jrn">
  <div class="jrn__inner">
    <div class="jrn__tags" id="jrnTags"></div>
    <div class="jrn-list" id="jrnList"></div>
  </div>
</section>

<script src="shared/data.js"></script>
<script src="shared/enhance.js?v=3" defer></script>
<script src="shared/i18n.js?v=1"></script>
<script src="shared/nav.js?v=5"></script>
<script src="shared/footer.js"></script>
<script>
(function() {
  const D = window.PORTFOLIO_DATA;
  let filter = 'all';

  function fmt(iso) {
    const [y,m,d] = iso.split('-');
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    return `${d} ${months[+m-1]} ${y}`;
  }

  function updateCount() {
    document.getElementById('jrnCount').textContent = `${D.journal.length} ${window.t('journal.entries')}`;
  }

  function buildTags() {
    const kickers = ['all', ...new Set(D.journal.map(j => j.kicker.en))];
    document.getElementById('jrnTags').innerHTML = kickers.map(k => {
      const label = k === 'all' ? window.t('journal.filter.all') : window.td(D.journal.find(j => j.kicker.en === k)?.kicker) || k;
      return `<button class="${k===filter?'on':''}" data-k="${k}">${label}</button>`;
    }).join('');
    document.getElementById('jrnTags').addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      filter = b.dataset.k;
      document.getElementById('jrnTags').querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
      render();
    });
  }

  function render() {
    const list = filter === 'all' ? D.journal : D.journal.filter(j => j.kicker.en === filter);
    document.getElementById('jrnList').innerHTML = list.map(j => `
      <a class="jrn-row" href="/journal/${j.slug}.html" data-link>
        <div class="jrn-row__date">${fmt(j.date)}</div>
        <div class="jrn-row__kicker">${window.td(j.kicker)}</div>
        <div>
          <div class="jrn-row__t">${window.td(j.title)}</div>
          <div class="jrn-row__excerpt">${window.td(j.summary)}</div>
          <div class="jrn-row__meta">${j.read} · ~${Math.round(parseInt(j.read)*180)} ${window.t('journal.words')}</div>
        </div>
        <div class="jrn-row__arrow">↗</div>
      </a>
    `).join('');
  }

  updateCount();
  buildTags();
  render();

  window.addEventListener('langchange', () => { updateCount(); buildTags(); render(); });
})();
</script>
</body>
</html>
