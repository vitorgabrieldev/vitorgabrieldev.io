<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Página não encontrada · Vitor Gabriel</title>
<meta name="description" content="Esta página não existe.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#c96442">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/tokens.css?v=4">
<link rel="stylesheet" href="/shared/nav.css?v=2">
<link rel="stylesheet" href="/shared/enhance.css?v=3">
<style>
.err-wrap {
  min-height: 80vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--pad-page);
}
.err-inner { max-width: 560px; }
.err-code {
  font-family: var(--font-mono);
  font-size: clamp(80px, 15vw, 160px);
  font-weight: 400;
  line-height: 1;
  color: var(--bg-sunken);
  letter-spacing: -0.04em;
  margin: 0 0 32px;
  user-select: none;
}
.err-title {
  font-family: var(--font-display);
  font-size: clamp(24px, 3vw, 36px);
  font-weight: 500;
  letter-spacing: -0.025em;
  line-height: 1.2;
  margin: 0 0 16px;
  color: var(--ink);
}
.err-sub {
  font-size: 16px;
  color: var(--ink-muted);
  margin: 0 0 40px;
  line-height: 1.6;
}
.err-actions { display: flex; gap: 12px; flex-wrap: wrap; }
</style>
</head>
<body data-density="comfortable">

<div class="err-wrap">
  <div class="err-inner">
    <div class="err-code">404</div>
    <h1 class="err-title">Página não encontrada.</h1>
    <p class="err-sub">O link pode estar quebrado, a página pode ter sido movida, ou você digitou algo errado. Não tem o que fazer aqui.</p>
    <div class="err-actions">
      <a href="/index.html" data-link class="btn btn--primary">← Início</a>
      <a href="/projects.html" data-link class="btn">Ver projetos</a>
      <a href="/journal.html" data-link class="btn">Ler o diário</a>
    </div>
  </div>
</div>

<script src="/shared/data.js"></script>
<script src="/shared/enhance.js?v=3" defer></script>
<script src="/shared/i18n.js?v=1"></script>
<script src="/shared/nav.js?v=5"></script>
<script src="/shared/footer.js"></script>
</body>
</html>
