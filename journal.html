<style>
.page--head { padding-top: 120px; padding-bottom: 64px; }
.head__line { display: flex; justify-content: space-between; padding-bottom: 40px; border-bottom: 1px solid var(--line); margin-bottom: 48px; }
.head__title { font-family: var(--font-display); font-size: clamp(44px, 7vw, 104px); letter-spacing: -0.045em; line-height: 0.95; font-weight: 500; max-width: 18ch; margin-bottom: 24px; }
.head__title em { font-style: italic; color: var(--accent); font-weight: 400; }
.head__lede { color: var(--ink-muted); font-size: 18px; max-width: 58ch; }

.jrn { padding: 40px var(--pad-page) var(--pad-section); }
.jrn__inner { max-width: 1200px; margin: 0 auto; }
.jrn__tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 40px; padding: 16px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.jrn__tags button { font-family: var(--font-mono); font-size: 12px; padding: 6px 12px; border-radius: 999px; color: var(--ink-muted); transition: all var(--dur) var(--ease); letter-spacing: .05em; }
.jrn__tags button.on { background: var(--ink); color: var(--bg); }
.jrn__tags button:hover { color: var(--ink); }
.jrn__tags button.on:hover { color: var(--bg); }

.jrn-list { border-top: 1px solid var(--line); }
.jrn-row { display: grid; grid-template-columns: 160px 160px 1fr auto; gap: 32px; padding: 32px 0; border-bottom: 1px solid var(--line); align-items: start; transition: padding var(--dur) var(--ease); cursor: pointer; }
.jrn-row:hover { padding-left: 20px; padding-right: 20px; background: var(--bg-elev); }
.jrn-row:hover .jrn-row__arrow { color: var(--accent); transform: translate(6px, -6px); }
.jrn-row__date { font-family: var(--font-mono); font-size: 12px; color: var(--ink-faint); letter-spacing: .06em; padding-top: 8px; }
.jrn-row__kicker { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--accent-ink); padding-top: 10px; }
.jrn-row__t { font-family: var(--font-display); font-size: 28px; letter-spacing: -0.02em; font-weight: 500; line-height: 1.15; margin-bottom: 10px; }
.jrn-row__excerpt { font-family: 'Source Serif 4', serif; font-size: 16px; color: var(--ink-muted); line-height: 1.55; max-width: 62ch; }
.jrn-row__meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .08em; margin-top: 10px; }
.jrn-row__arrow { font-family: var(--font-mono); font-size: 24px; color: var(--ink-faint); transition: all var(--dur) var(--ease); padding-top: 4px; }

@media (max-width: 900px) {
  .jrn-row { grid-template-columns: 1fr auto; }
  .jrn-row__date, .jrn-row__kicker { grid-column: 1 / -1; padding-top: 0; }
}

/* Article modal */
.jrn-modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; overflow-y: auto; transform: translateY(100%); transition: transform var(--dur) var(--ease-in-out); }
.jrn-modal.open { transform: translateY(0); }
.jrn-modal__close {
  position: fixed; top: 20px; right: 24px; z-index: 1001;
  padding: 10px 16px;
  font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: .08em;
  background: var(--bg-elev); border: 1px solid var(--line-strong); border-radius: 999px;
  cursor: pointer;
}
.jrn-modal__inner { max-width: 720px; margin: 0 auto; padding: 80px var(--pad-page); }
.jrn-modal__kicker { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: .1em; color: var(--accent-ink); margin-bottom: 24px; }
.jrn-modal__title { font-family: var(--font-display); font-size: clamp(36px, 5vw, 56px); letter-spacing: -0.03em; line-height: 1; font-weight: 500; margin-bottom: 16px; }
.jrn-modal__meta { font-family: var(--font-mono); font-size: 12px; color: var(--ink-faint); letter-spacing: .06em; padding-bottom: 40px; border-bottom: 1px solid var(--line); margin-bottom: 40px; }
.jrn-modal__body { font-family: 'Source Serif 4', serif; }
.jrn-modal__body p { font-size: 19px; line-height: 1.75; color: var(--ink); margin: 0 0 24px; }
.jrn-modal__body p.lead { font-size: 22px; color: var(--ink-muted); font-style: italic; }
.jrn-modal__body h3 { font-family: var(--font-display); font-weight: 500; font-size: 26px; margin: 36px 0 16px; letter-spacing: -0.015em; }
.jrn-modal__body blockquote { border-left: 2px solid var(--accent); padding-left: 20px; margin: 24px 0; font-style: italic; color: var(--ink-muted); }
</style>
<link rel="stylesheet" href="shared/enhance.css?v=3">

<body data-screen-label="journal" data-density="comfortable">

<section class="page page--head">
  <div class="container">
    <div class="head__line reveal">
      <span class="mono-label">[JOURNAL] Writing · Learning in public</span>
      <span class="mono-label" id="jrnCount">— entries</span>
    </div>
    <h1 class="head__title reveal reveal-delay-1">Thinking out loud, in <em>full paragraphs</em>.</h1>
    <p class="head__lede reveal reveal-delay-2">Notes on architecture, decisions in production, and what I'm reading. Unpolished by design — the point is to think, not to publish.</p>
  </div>
</section>

<section class="jrn">
  <div class="jrn__inner">
    <div class="jrn__tags" id="jrnTags"></div>
    <div class="jrn-list" id="jrnList"></div>
  </div>
</section>

<!-- Modal -->
<div class="jrn-modal" id="jrnModal">
  <button class="jrn-modal__close" id="jrnClose">✕ Close</button>
  <div class="jrn-modal__inner" id="jrnInner"></div>
</div>

<script src="shared/data.js"></script>
<script src="shared/enhance.js?v=3" defer></script>
<script src="shared/i18n.js?v=1"></script>
<script src="shared/nav.js?v=5"></script>
<script src="shared/footer.js"></script>
<script>
(function() {
  const D = window.PORTFOLIO_DATA;
  let filter = 'all';
  document.getElementById('jrnCount').textContent = `${D.journal.length} entries`;

  const kickers = ['all', ...new Set(D.journal.map(j => j.kicker))];
  document.getElementById('jrnTags').innerHTML = kickers.map(k => `<button class="${k==='all'?'on':''}" data-k="${k}">${k === 'all' ? 'All' : k}</button>`).join('');
  document.getElementById('jrnTags').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    filter = b.dataset.k;
    document.getElementById('jrnTags').querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
    render();
  });

  function render() {
    const list = filter === 'all' ? D.journal : D.journal.filter(j => j.kicker === filter);
    document.getElementById('jrnList').innerHTML = list.map(j => `
      <div class="jrn-row" data-slug="${j.slug}">
        <div class="jrn-row__date">${fmt(j.date)}</div>
        <div class="jrn-row__kicker">${j.kicker}</div>
        <div>
          <div class="jrn-row__t">${j.title}</div>
          <div class="jrn-row__excerpt">${j.excerpt}</div>
          <div class="jrn-row__meta">${j.read} · ~${Math.round(parseInt(j.read)*180)} words</div>
        </div>
        <div class="jrn-row__arrow">↗</div>
      </div>
    `).join('');
  }
  render();

  // Modal
  const modal = document.getElementById('jrnModal');
  const inner = document.getElementById('jrnInner');
  document.addEventListener('click', e => {
    const row = e.target.closest('.jrn-row');
    if (!row) return;
    const j = D.journal.find(x => x.slug === row.dataset.slug);
    inner.innerHTML = articleHTML(j);
    modal.classList.add('open');
    modal.scrollTop = 0;
  });
  document.getElementById('jrnClose').addEventListener('click', () => modal.classList.remove('open'));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') modal.classList.remove('open'); });

  // Deep link
  if (location.hash) {
    const slug = location.hash.slice(1);
    const j = D.journal.find(x => x.slug === slug);
    if (j) { inner.innerHTML = articleHTML(j); modal.classList.add('open'); }
  }

  function articleHTML(j) {
    return `
      <div class="jrn-modal__kicker">${j.kicker}</div>
      <h1 class="jrn-modal__title">${j.title}</h1>
      <div class="jrn-modal__meta">${fmt(j.date)} · ${j.read} · by Vitor Gabriel</div>
      <div class="jrn-modal__body">
        <p class="lead">${j.excerpt}</p>
        <p>This is a placeholder entry — the real article lives in my drafts folder and migrates here when it's ready. The idea, for now, is to give the portfolio the shape of someone who writes, and to show what the topics look like when they collect.</p>
        <h3>Why write at all?</h3>
        <p>Because the best way to know whether I actually understand something is to write it down, badly, and then read it back the next week. The second pass is where the real understanding happens.</p>
        <blockquote>Writing is the compiler for thought. The error messages are unkind.</blockquote>
        <p>Expect rough edges. Expect corrections. Expect the occasional "I was wrong about this, here's why" post — those are the ones I learn from most.</p>
        <h3>Subscribing</h3>
        <p>No newsletter yet. Follow along on <a href="https://github.com/vitorgabrieldev" style="color:var(--accent)">GitHub</a> or check back here.</p>
      </div>`;
  }

  function fmt(iso) {
    const [y,m,d] = iso.split('-');
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    return `${d} ${months[+m-1]} ${y}`;
  }
})();
</script>
</body>
